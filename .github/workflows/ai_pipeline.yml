name: AI Chapter Pipeline

on:
  push:
    paths:
      - "output/cap*.md"
      - "agents/*.md"
      - "scripts/*.py"

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai python-dotenv

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/orchestrate_chapter.py 07
